<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부광솔라 방문자 분석 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d8c4e; --accent: #f39c12; --blue: #2563eb;
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --text: #e2e8f0; --sub: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; }

        header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 15px 30px; display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 1.1rem; font-weight: 700; }
        header h1 span { color: var(--primary); }
        .live-badge {
            background: #22c55e; color: white; font-size: 0.75rem; font-weight: 700;
            padding: 4px 12px; border-radius: 50px; display: flex; align-items: center; gap: 6px;
        }
        .live-badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 25px 30px; }

        .kpi {
            background: var(--card); border-radius: 14px; padding: 22px;
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .kpi::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--primary), #7fde98);
        }
        .kpi-label { font-size: 0.78rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .kpi-value { font-size: 2rem; font-weight: 900; color: var(--text); }
        .kpi-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 2rem; opacity: 0.1; }

        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 30px 25px; }
        .chart-card { background: var(--card); border-radius: 14px; padding: 25px; border: 1px solid var(--border); }
        .chart-card h3 { font-size: 0.9rem; color: var(--sub); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .chart-card canvas { max-height: 250px; }

        .segments-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 0 30px 25px; }
        .seg-card {
            background: var(--card); border-radius: 12px; padding: 18px;
            border: 1px solid var(--border); text-align: center;
        }
        .seg-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .seg-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
        .seg-count { font-size: 1.6rem; font-weight: 900; color: var(--primary); }
        .seg-intent { font-size: 0.75rem; color: var(--sub); margin-top: 4px; }

        .table-section { padding: 0 30px 30px; }
        .table-section h3 { font-size: 1rem; margin-bottom: 15px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        .data-table th { background: var(--border); color: var(--sub); padding: 10px; text-align: left; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .data-table td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .data-table tbody tr:hover { background: rgba(255,255,255,0.03); }

        .risk-badge { padding: 3px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .risk-high { background: rgba(239,68,68,0.2); color: #f87171; }
        .risk-med { background: rgba(234,179,8,0.2); color: #facc15; }
        .risk-low { background: rgba(34,197,94,0.2); color: #4ade80; }

        .heatmap-section { padding: 0 30px 30px; }
        .heatmap-section h3 { font-size: 1rem; margin-bottom: 15px; }
        #heatmapCanvas { width: 100%; height: 300px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); }

        .refresh-btn {
            background: var(--primary); color: white; border: none;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        .refresh-btn:hover { opacity: 0.85; }

        .no-data { text-align: center; color: var(--sub); padding: 30px; }
        .section-info { padding: 0 30px 25px; }
        .section-bars { display: flex; gap: 10px; flex-wrap: wrap; }
        .sec-bar { flex: 1; min-width: 120px; background: var(--card); border-radius: 10px; padding: 15px; border: 1px solid var(--border); }
        .sec-bar-name { font-size: 0.8rem; color: var(--sub); margin-bottom: 8px; }
        .sec-bar-track { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
        .sec-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #7fde98); border-radius: 4px; transition: width 0.5s ease; }
        .sec-bar-val { font-size: 0.85rem; font-weight: 700; margin-top: 6px; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1>☀️ <span>부광솔라</span> 방문자 분석 대시보드</h1>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="refresh-btn" onclick="loadAll()"><i class="fas fa-sync-alt"></i> 새로고침</button>
        <div class="live-badge">LIVE</div>
    </div>
</header>

<!-- KPI -->
<div class="dashboard">
    <div class="kpi">
        <div class="kpi-label">오늘 방문자</div>
        <div class="kpi-value" id="kpi-visitors">-</div>
        <div class="kpi-icon"><i class="fas fa-users"></i></div>
    </div>
    <div class="kpi">
        <div class="kpi-label">총 세션</div>
        <div class="kpi-value" id="kpi-sessions">-</div>
        <div class="kpi-icon"><i class="fas fa-chart-line"></i></div>
    </div>
    <div class="kpi">
        <div class="kpi-label">이탈율</div>
        <div class="kpi-value" id="kpi-churn">-</div>
        <div class="kpi-icon"><i class="fas fa-door-open"></i></div>
    </div>
    <div class="kpi">
        <div class="kpi-label">최다 세그먼트</div>
        <div class="kpi-value" id="kpi-top-seg">-</div>
        <div class="kpi-icon"><i class="fas fa-user-tag"></i></div>
    </div>
</div>

<!-- 차트 -->
<div class="charts-row">
    <div class="chart-card">
        <h3><i class="fas fa-clock" style="color:var(--accent)"></i> 시간대별 방문</h3>
        <canvas id="hourlyChart"></canvas>
    </div>
    <div class="chart-card">
        <h3><i class="fas fa-mobile-alt" style="color:var(--blue)"></i> 디바이스 분포</h3>
        <canvas id="deviceChart"></canvas>
    </div>
</div>

<!-- YOLO 세그먼트 -->
<div class="segments-grid" id="segmentsGrid">
    <div class="no-data"><i class="fas fa-satellite fa-2x"></i><br><br>데이터 로딩 중...</div>
</div>

<!-- 섹션 체류시간 -->
<div class="section-info">
    <h3 style="margin-bottom:15px;"><i class="fas fa-stopwatch" style="color:var(--primary); margin-right:8px;"></i>섹션별 평균 체류시간</h3>
    <div class="section-bars" id="sectionBars"></div>
</div>

<!-- 이탈 위험 테이블 -->
<div class="table-section">
    <h3><i class="fas fa-exclamation-triangle" style="color:var(--accent); margin-right:8px;"></i>이탈 위험 세션</h3>
    <table class="data-table">
        <thead>
            <tr><th>세션 ID</th><th>위험도</th><th>체류(초)</th><th>스크롤</th><th>디바이스</th><th>세그먼트</th></tr>
        </thead>
        <tbody id="churnTable"></tbody>
    </table>
</div>

<script>
    const API = '';  // 같은 서버에서 서빙 시 상대경로 사용

    let hourlyChart, deviceChart;

    async function loadSummary() {
        try {
            const r = await fetch(API + '/api/analytics/summary');
            const d = await r.json();

            document.getElementById('kpi-visitors').textContent = d.today_visitors || 0;
            document.getElementById('kpi-sessions').textContent = d.total_sessions || 0;

            const segs = d.segment_distribution || {};
            const topSeg = Object.entries(segs).sort((a,b)=>b[1]-a[1])[0];
            const segLabels = { investor:'투자자', farmer:'농업인', developer:'개발사', researcher:'연구자', general:'일반' };
            document.getElementById('kpi-top-seg').textContent = topSeg ? (segLabels[topSeg[0]] || topSeg[0]) : '-';

            // 시간대 차트
            const hours = Array.from({length:24}, (_,i)=>i);
            const hv = d.hourly_visits || {};
            const hourVals = hours.map(h => hv[h] || 0);

            if (hourlyChart) hourlyChart.destroy();
            hourlyChart = new Chart(document.getElementById('hourlyChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: hours.map(h => h+'시'),
                    datasets: [{ data: hourVals, backgroundColor: 'rgba(45,140,78,0.7)', borderRadius: 4 }]
                },
                options: { plugins:{legend:{display:false}}, scales:{x:{grid:{color:'rgba(255,255,255,0.05)'}}, y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#94a3b8'}}}, responsive:true, maintainAspectRatio:false }
            });

            // 디바이스 차트
            const dev = d.device_distribution || {};
            if (deviceChart) deviceChart.destroy();
            deviceChart = new Chart(document.getElementById('deviceChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(dev),
                    datasets: [{ data: Object.values(dev), backgroundColor: ['#2d8c4e','#2563eb','#f39c12'], borderWidth: 0 }]
                },
                options: { plugins:{legend:{position:'bottom', labels:{color:'#94a3b8'}}}, responsive:true, maintainAspectRatio:false }
            });

            // 섹션 체류
            const secs = d.section_avg_time || {};
            const maxSec = Math.max(...Object.values(secs), 1);
            const secNames = { home:'홈', about:'회사소개', revenue:'통합수익분석', site3d:'입지분석', tech:'기술특허', contact:'문의' };
            const secEl = document.getElementById('sectionBars');
            secEl.innerHTML = Object.entries(secs).map(([k,v]) => `
                <div class="sec-bar">
                    <div class="sec-bar-name">${secNames[k]||k}</div>
                    <div class="sec-bar-track"><div class="sec-bar-fill" style="width:${(v/maxSec*100).toFixed(0)}%"></div></div>
                    <div class="sec-bar-val">${v}초</div>
                </div>`).join('') || '<div class="no-data">데이터 없음</div>';

        } catch(e) { console.error('[Dashboard]', e); }
    }

    async function loadSegments() {
        try {
            const r = await fetch(API + '/api/analytics/segments');
            const d = await r.json();
            const icons = { investor:'💰', farmer:'🌱', developer:'🏗️', researcher:'🔬', general:'👤' };
            const intents = { investor:'투자 수익 검토', farmer:'스마트팜 도입', developer:'시공 파트너십', researcher:'기술 연구', general:'정보 탐색' };
            const grid = document.getElementById('segmentsGrid');
            if (!Object.keys(d).length) {
                grid.innerHTML = '<div class="no-data">세션 데이터 없음 (방문자 발생 후 표시)</div>';
                return;
            }
            grid.innerHTML = Object.entries(d).sort((a,b)=>b[1].count-a[1].count).map(([seg,info]) => `
                <div class="seg-card">
                    <div class="seg-icon">${icons[seg]||'👤'}</div>
                    <div class="seg-name">${seg}</div>
                    <div class="seg-count">${info.count}</div>
                    <div class="seg-intent">${intents[seg]||seg}</div>
                    <div style="font-size:0.75rem; color:var(--sub); margin-top:4px;">평균 ${info.avg_duration_sec}초</div>
                </div>`).join('');
        } catch(e) {}
    }

    async function loadChurn() {
        try {
            const r = await fetch(API + '/api/analytics/churn');
            const d = await r.json();
            document.getElementById('kpi-churn').textContent = (d.churn_rate_pct || 0) + '%';
            const tbody = document.getElementById('churnTable');
            if (!d.high_risk_sessions?.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">이탈 위험 세션 없음</td></tr>';
                return;
            }
            tbody.innerHTML = d.high_risk_sessions.map(s => {
                const riskClass = s.risk_score >= 7 ? 'risk-high' : s.risk_score >= 4 ? 'risk-med' : 'risk-low';
                return `<tr>
                    <td style="font-size:0.75rem; color:var(--sub)">${s.session_id?.slice(-8)||'-'}</td>
                    <td><span class="risk-badge ${riskClass}">${s.risk_score}점</span></td>
                    <td>${s.duration||0}s</td>
                    <td>${s.scroll_max||0}%</td>
                    <td>${s.device||'-'}</td>
                    <td>${s.segment||'-'}</td>
                </tr>`;
            }).join('');
        } catch(e) {}
    }

    async function loadAll() {
        await Promise.all([loadSummary(), loadSegments(), loadChurn()]);
    }

    loadAll();
    setInterval(loadAll, 30000); // 30초마다 자동 갱신
</script>
</body>
</html>
